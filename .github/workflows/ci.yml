name: CI — Build & Test

on:
  push:
    branches: ["**"]
    paths:
      - "scheduler-mycelium/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "scheduler-mycelium/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # PostgreSQL service container — used by SchedulerMyceliumApplicationTests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schedule_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: scheduler-mycelium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw verify -B
        env:
          # These mirror the @TestPropertySource overrides in the test class.
          # They are safe non-secret values only used by the test PostgreSQL container.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/schedule_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long
          JWT_EXPIRATION_MS: 86400000
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          WEBHOOK_BOOKING_CONFIRMED_URL: http://localhost/test-webhook
          WEBHOOK_BOOKING_CANCELLED_URL: http://localhost/test-webhook

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: scheduler-mycelium/target/surefire-reports/

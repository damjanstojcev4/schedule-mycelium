name: Deploy to Hetzner

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    branches: [main]
    types:
      - completed
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/scheduler-mycelium

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./scheduler-mycelium
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e
            
            APP_DIR=/opt/scheduler-mycelium
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            # Create docker-compose.yml directly on server
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              app:
                image: ${{ env.IMAGE_NAME }}:latest
                container_name: scheduler_app
                restart: always
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_PROFILES_ACTIVE=prod
                  - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/scheduler_mycelium
                  - SPRING_DATASOURCE_USERNAME=${DB_USER}
                  - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
                  - JWT_SECRET=${JWT_SECRET}
                  - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
                env_file:
                  - .env
                depends_on:
                  - db
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
            
              db:
                image: postgres:16-alpine
                container_name: scheduler_db
                restart: always
                environment:
                  - POSTGRES_DB=${POSTGRES_DB}
                  - POSTGRES_USER=${POSTGRES_USER}
                  - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                ports:
                  - "5432:5432"
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
            
            volumes:
              postgres_data:
            EOF
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull latest image
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            # Stop and remove old containers
            docker compose down --remove-orphans 2>/dev/null || true
            
            # Start new containers
            docker compose up -d
            
            # Clean up
            docker image prune -f
            
            # Show status
            docker ps
            echo "✅ Deployment complete!"
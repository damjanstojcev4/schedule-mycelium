# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — Scheduler Mycelium Production Stack
#
#  Services:
#    db  — PostgreSQL 16 with a persistent named volume
#    app — Spring Boot application (built from ./Dockerfile)
#
#  Usage on the Hetzner server:
#    1. Copy this file and .env to /opt/scheduler-mycelium/
#    2. docker compose pull   (or docker compose build)
#    3. docker compose up -d
#
#  On the very first deployment set SPRING_JPA_HIBERNATE_DDL_AUTO=create in
#  .env, start once, then change it back to 'validate' and restart.
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: scheduler_db
    restart: always   # ← Changed from unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network   # ← Optional, but keep it if you want

  # ── Spring Boot Application ────────────────────────────────────────────────
  app:
    image: ghcr.io/damjanstojcev4/scheduler-mycelium:latest
    container_name: scheduler_app
    restart: always   # ← Changed from unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      WEBHOOK_BOOKING_CONFIRMED_URL: ${WEBHOOK_BOOKING_CONFIRMED_URL}
      WEBHOOK_BOOKING_CANCELLED_URL: ${WEBHOOK_BOOKING_CANCELLED_URL}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network   # ← Optional, but keep it if you want

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
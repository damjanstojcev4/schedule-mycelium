# ─────────────────────────────────────────────────────────────────────────────
#  application-prod.properties
#  Activated automatically when SPRING_PROFILES_ACTIVE=prod
#  (set this in docker-compose.yml or as an env var on the server)
# ─────────────────────────────────────────────────────────────────────────────

# ── Logging — structured JSON for log aggregators (e.g. Loki, CloudWatch) ───
# Uncomment if you add logback-json or similar:
# logging.structured.format.console=ecs

# ── Connection pool — production sizing ──────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ── Hibernate ────────────────────────────────────────────────────────────────
# 'validate' ensures startup fails fast if schema diverges from entities.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ── Security / Error messages ─────────────────────────────────────────────────
# Don't expose stack traces in error responses in production
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── Actuator ─────────────────────────────────────────────────────────────────
# In production only expose health; info is harmless but optional
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
